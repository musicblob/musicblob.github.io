<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BlobAnimation · Bass Kick Reactive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --term-bg: #050805;
    --term-border: #3d7a3d;
    --term-text: #6bff6b;
    --term-dim: #2a5a2a;
    --term-accent: #88ccff;
    --term-warn: #ff6666;
    --term-shadow: #112211;
  }

  body {
    background: #0e0e0e;
    color: var(--term-text);
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  #blob_container {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #0a0a1a;
    touch-action: none;
    cursor: pointer;
  }

  .ui {
    position: fixed;
    bottom: 16px;
    left: 16px;
    z-index: 10;
    width: min(320px, calc(100vw - 32px));
    pointer-events: none;
    background: var(--term-bg);
    border: 2px solid var(--term-border);
    box-shadow: 4px 4px 0 var(--term-shadow);
    padding: 0;
    image-rendering: pixelated;
  }

  .term-header {
    padding: 4px 8px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--term-accent);
    border-bottom: 2px solid var(--term-dim);
    background: #081008;
  }

  .shapes-panel {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    border-bottom: 2px solid var(--term-dim);
    pointer-events: all;
  }

  .term-label {
    font-size: 9px;
    color: var(--term-dim);
    letter-spacing: 0.1em;
    margin-right: 2px;
    flex-shrink: 0;
  }

  .shape-btn {
    flex: 1;
    min-width: 0;
    height: 26px;
    border: 2px solid var(--term-border);
    border-radius: 0;
    background: #081008;
    color: var(--term-dim);
    font-family: inherit;
    font-size: 10px;
    font-weight: bold;
    cursor: pointer;
    padding: 0;
    transition: none;
  }

  .shape-btn.active {
    background: var(--term-text);
    color: #000;
    border-color: var(--term-text);
    box-shadow: inset 0 0 0 1px #000;
  }

  .file-controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    padding: 6px 8px 8px;
    pointer-events: all;
  }

  .file-label,
  .play-pause,
  .mic-btn {
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    font-size: 9px;
    font-weight: bold;
    letter-spacing: 0.06em;
    cursor: pointer;
    border: 2px solid var(--term-border);
    border-radius: 0;
    background: #081008;
    color: var(--term-text);
    padding: 0 4px;
    transition: none;
  }

  .file-label:active,
  .play-pause:active:not(:disabled),
  .mic-btn:active {
    transform: translate(1px, 1px);
    box-shadow: none;
  }

  .play-pause:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    color: var(--term-dim);
  }

  .mic-btn.active {
    background: var(--term-warn);
    border-color: var(--term-warn);
    color: #000;
  }

  .time-info {
    grid-column: 1 / -1;
    font-size: 10px;
    font-family: inherit;
    color: var(--term-accent);
    background: #081008;
    border: 2px solid var(--term-dim);
    padding: 4px 8px;
    text-align: center;
    letter-spacing: 0.08em;
  }

  .debug {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top, 0px));
    left: 10px;
    right: 10px;
    font-size: 9px;
    color: var(--term-text);
    background: var(--term-bg);
    border: 2px solid var(--term-dim);
    box-shadow: 3px 3px 0 var(--term-shadow);
    padding: 4px 8px;
    font-family: inherit;
    z-index: 20;
    pointer-events: none;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #mp3Upload { display: none; }

  .tap-hint {
    display: none;
  }

  @media (max-width: 640px) {
    .ui,
    .debug {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s steps(3), transform 0.2s steps(3), visibility 0.2s;
    }

    body.controls-visible .ui,
    body.controls-visible .debug {
      opacity: 1;
      visibility: visible;
    }

    body.controls-visible .file-controls,
    body.controls-visible .shapes-panel,
    body.controls-visible .shape-btn,
    body.controls-visible .mic-btn,
    body.controls-visible .play-pause,
    body.controls-visible .file-label {
      pointer-events: all;
    }

    .ui {
      left: 8px;
      right: 8px;
      bottom: 0;
      width: auto;
      transform: translateY(110%);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    body.controls-visible .ui {
      transform: translateY(0);
    }

    .debug {
      transform: translateY(-6px);
    }

    body.controls-visible .debug {
      transform: translateY(0);
    }

    .tap-hint {
      display: block;
      position: fixed;
      bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--term-dim);
      background: var(--term-bg);
      border: 2px solid var(--term-dim);
      padding: 4px 10px;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    body.mode-chaos .tap-hint::after {
      content: ' // DBL-TAP=PANEL';
    }

    body.controls-visible .tap-hint {
      opacity: 0;
    }
  }
</style>
</head>
<body>

<div id="blob_container"></div>
<div class="tap-hint" id="tapHint">&gt; TAP TO OPEN</div>

<div class="ui">
  <div class="term-header">BLOB.SYS // AUDIO REACTIVE</div>
  <div class="shapes-panel">
    <span class="term-label">MODE</span>
    <button class="shape-btn active" data-shape="0" title="Organic">01</button>
    <button class="shape-btn" data-shape="1" title="Spiky">02</button>
    <button class="shape-btn" data-shape="2" title="Chaos">03</button>
    <button class="shape-btn" data-shape="3" title="Gentle">04</button>
  </div>
  <div class="file-controls">
    <label class="file-label" for="mp3Upload">[ LOAD ]</label>
    <input type="file" id="mp3Upload" accept="audio/*">
    <button class="play-pause" id="playPauseBtn" disabled>[ PLAY ]</button>
    <button class="mic-btn" id="micBtn">[ MIC ]</button>
    <div class="time-info" id="timeDisplay">--:-- / --:--</div>
  </div>
</div>

<div class="debug" id="dbg">&gt; INIT...</div>

// ==================== ФОРМЫ ДЛЯ БЛОБА ====================
var shapes = [
    { wave1: { amplitude: 76.923, frequency: 0.879, phase: 0 }, wave2: { amplitude: 60, frequency: 0.165, phase: 0 }, wave3: { amplitude: 50, frequency: 0, phase: 0 } },
    { wave1: { amplitude: 0, frequency: 0, phase: 0 }, wave2: { amplitude: 0, frequency: 0, phase: 0 }, wave3: { amplitude: 35, frequency: 10, phase: 0 } },
    { wave1: { amplitude: 200, frequency: 7.692, phase: 6.283 }, wave2: { amplitude: 200, frequency: 7.912, phase: 6.283 }, wave3: { amplitude: 200, frequency: 10, phase: 6.283 } },
    { wave1: { amplitude: 34.066, frequency: 5.934, phase: 0 }, wave2: { amplitude: 20.879, frequency: 6.154, phase: 0 }, wave3: { amplitude: 50.549, frequency: 0, phase: 0 } }
];

var blob_settings = {
    BLOB_SIZE: 250,
    BLOB_DISTANCE: 1000,
    DETALISATION: 60,
    PERSPECTIVE_DISTORTION: 1,
    ROTATION_SPEED: 5,
    DOT_SIZE: 1.5,
    DOT_COLOR: "#88ccff",
    MOUSE_DISTANCE_MIN: 20,
    MOUSE_DISTANCE_MAX: 400,
    MOUSE_SENSITIVITY: 1,
    INERTIAL_TIME: 4,
    INITIAL_SHAPE: shapes[0],
    USE_WAVE_MOTION: true,
    USE_WAVE_SWING: true,
    USE_MORPHING: true,
    MORPHING_AUTOPLAY: false,
    MORPHING_DURATION: 1,
    MORPHING_DELAY: 0,
    MORPHING_TRANSITION_TYPE: "cubic",
    MORPHING_SHAPES: [shapes[0], shapes[1], shapes[2], shapes[3]],
    WAVE_1_MOTION_SPEED: 1.3,
    WAVE_2_MOTION_SPEED: 0.8
};

// ==================== ЗАПУСК БЛОБА ====================
function isMobileView() {
    return window.matchMedia('(max-width: 640px)').matches;
}

var mobileAudioScale = 1;
var mobileMaxBoost = [999, 999, 999];

if (isMobileView()) {
    Object.assign(blob_settings, {
        BLOB_SIZE: 170,
        BLOB_DISTANCE: 1400,
        DETALISATION: 52,
        DOT_SIZE: 1.45,
        MOUSE_SENSITIVITY: 1.4
    });
    mobileAudioScale = 0.62;
    mobileMaxBoost = [85, 75, 65];
}

function applyAudioAmplitude(baseAmp, volBoost, kickBoost, maxBoost) {
    var value = baseAmp + volBoost + kickBoost;
    if (isMobileView()) {
        value = Math.min(value, baseAmp + maxBoost);
    }
    return value;
}

var defaultViewSettings = {
    blobDistance: isMobileView() ? 1400 : 1000,
    dotSize: isMobileView() ? 1.45 : 1.5
};

var shapeViewOverrides = {
    2: { blobDistance: 1550, dotSize: 1.65 }
};

function applyShapeViewSettings(shapeIndex) {
    var preset = shapeViewOverrides[shapeIndex] || defaultViewSettings;
    blob.blobDistance = preset.blobDistance;
    blob.dotSize = preset.dotSize;
    applyShapeInteractionSettings(shapeIndex);
}

function applyShapeInteractionSettings(shapeIndex) {
    document.body.classList.toggle('mode-chaos', shapeIndex === 2);
    if (shapeIndex === 2) {
        blob.mouseSensitivity = isMobileView() ? 3.4 : 2.4;
        blob.rotationSpeed = isMobileView() ? 0.8 : 1.5;
        blob.inertialTime = isMobileView() ? 6 : 4;
        blob.mouseDistanceMax = 520;
    } else {
        blob.mouseSensitivity = isMobileView() ? 1.4 : 1;
        blob.rotationSpeed = isMobileView() ? 4 : 5;
        blob.inertialTime = 4;
        blob.mouseDistanceMax = 400;
    }
}

var blob = new BlobAnimation("blob_container", blob_settings);
var currentShape = 0;
blob.morphTo(shapes[0]);
applyShapeViewSettings(0);

// Кнопки форм
document.querySelectorAll('.shape-btn').forEach((btn, idx) => {
    btn.addEventListener('click', () => {
        currentShape = idx;
        blob.morphTo(shapes[idx]);
        applyShapeViewSettings(idx);
        if (idx === 2 && isMobileView()) {
            document.getElementById('dbg').innerHTML = '> MODE 03 // DRAG=ROTATE DBL-TAP=PANEL';
        }
        document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});

// ==================== АУДИО СИСТЕМА С ДЕТЕКТОМ БАС-УДАРА ====================
var audioCtx = null;
var analyser = null;
var dataArray = null;
var currentAudio = null;
var isFilePlaying = false;
var isMicActive = false;
var animationId = null;

var smoothVol = 0;
var bassLevelPrev = 0;
var kickTimer = 0;

function getVolume() {
    if (!analyser || !dataArray) return 0;
    analyser.getByteFrequencyData(dataArray);
    var sum = 0;
    for (var i = 0; i < Math.min(dataArray.length, 60); i++) sum += dataArray[i];
    return sum / 60 / 255;
}

function getBassKick() {
    if (!analyser || !dataArray) return 0;
    analyser.getByteFrequencyData(dataArray);
    var bassSum = 0;
    for (var i = 0; i < 8; i++) bassSum += dataArray[i];
    var rawBass = bassSum / 8 / 255;
    
    var kick = 0;
    if (rawBass > 0.4 && rawBass > bassLevelPrev * 1.5) {
        kickTimer = 0.3;
    }
    bassLevelPrev = rawBass;
    
    if (kickTimer > 0) {
        kickTimer -= 0.02;
        return Math.min(1, kickTimer * 3);
    }
    return 0;
}

function updateVisualization() {
    if (!isFilePlaying && !isMicActive) {
        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;
        return;
    }
    if (!analyser || !dataArray) {
        animationId = requestAnimationFrame(updateVisualization);
        return;
    }
    
    var vol = getVolume();
    var smooth = 0.3;
    smoothVol += (vol - smoothVol) * smooth;
    
    var kickImpact = getBassKick();
    
    var base = shapes[currentShape];
    var baseAmp1 = (base.wave1 && base.wave1.amplitude) || 70;
    var baseAmp2 = (base.wave2 && base.wave2.amplitude) || 55;
    var baseAmp3 = (base.wave3 && base.wave3.amplitude) || 45;
    
    blob.wave1Amplitude = applyAudioAmplitude(
        baseAmp1,
        smoothVol * 180 * mobileAudioScale,
        kickImpact * 120 * mobileAudioScale,
        mobileMaxBoost[0]
    );
    blob.wave2Amplitude = applyAudioAmplitude(
        baseAmp2,
        smoothVol * 150 * mobileAudioScale,
        kickImpact * 100 * mobileAudioScale,
        mobileMaxBoost[1]
    );
    blob.wave3Amplitude = applyAudioAmplitude(
        baseAmp3,
        smoothVol * 120 * mobileAudioScale,
        kickImpact * 80 * mobileAudioScale,
        mobileMaxBoost[2]
    );
    
    var kickIcon = kickImpact > 0.1 ? "KICK " : "";
    document.getElementById('dbg').innerHTML = `> LVL ${Math.floor(smoothVol * 100)}% | ${kickIcon}kick:${kickImpact.toFixed(2)} | a1:${blob.wave1Amplitude.toFixed(0)} a2:${blob.wave2Amplitude.toFixed(0)} a3:${blob.wave3Amplitude.toFixed(0)}`;
    
    animationId = requestAnimationFrame(updateVisualization);
}

async function playMP3(file) {
    // Останавливаем всё
    if (isFilePlaying && currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }
    if (isMicActive) {
        if (audioCtx) await audioCtx.close();
        isMicActive = false;
        document.getElementById('micBtn').classList.remove('active');
    }
    if (animationId) cancelAnimationFrame(animationId);
    
    var audio = new Audio();
    audio.setAttribute('playsinline', '');
    audio.setAttribute('webkit-playsinline', '');
    audio.src = URL.createObjectURL(file);
    currentAudio = audio;
    
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.6;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    var source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    
    // Ждём user gesture для play()
    await audioCtx.resume();
    
    // Важно: создать источник ДО того, как аудио начнёт играть
    var playPromise = audio.play();
    if (playPromise !== undefined) {
        playPromise.catch(e => {
            console.log("Play error:", e);
            document.getElementById('dbg').innerHTML = "> ERR: TAP [ PLAY ]";
        });
    }
    
    isFilePlaying = true;
    
    document.getElementById('playPauseBtn').disabled = false;
    document.getElementById('playPauseBtn').textContent = '[ || ]';
    document.getElementById('hintText') && (document.getElementById('hintText').innerHTML = '🎵 MP3 · бас-удары дёргают форму');
    
    function updateTime() {
        if (currentAudio && isFilePlaying && currentAudio.duration) {
            var cur = currentAudio.currentTime;
            var dur = currentAudio.duration;
            document.getElementById('timeDisplay').innerText = `${Math.floor(cur/60)}:${Math.floor(cur%60).toString().padStart(2,'0')} / ${Math.floor(dur/60)}:${Math.floor(dur%60).toString().padStart(2,'0')}`;
            requestAnimationFrame(updateTime);
        }
    }
    updateTime();
    updateVisualization();
    
    audio.addEventListener('ended', () => {
        isFilePlaying = false;
        document.getElementById('playPauseBtn').textContent = '[ PLAY ]';
        var base = shapes[currentShape];
        blob.wave1Amplitude = (base.wave1 && base.wave1.amplitude) || 70;
        blob.wave2Amplitude = (base.wave2 && base.wave2.amplitude) || 55;
        blob.wave3Amplitude = (base.wave3 && base.wave3.amplitude) || 45;
    });
}

function stopPlayback() {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }
    isFilePlaying = false;
    if (audioCtx) {
        audioCtx.close().catch(e=>{});
        audioCtx = null;
    }
    analyser = null;
    dataArray = null;
    document.getElementById('playPauseBtn').textContent = '[ PLAY ]';
    document.getElementById('playPauseBtn').disabled = true;
    document.getElementById('timeDisplay').innerText = '--:-- / --:--';
    if (animationId) cancelAnimationFrame(animationId);
    animationId = null;
}

document.getElementById('mp3Upload').addEventListener('change', (e) => {
    if (e.target.files && e.target.files[0]) {
        playMP3(e.target.files[0]);
    }
});

document.getElementById('playPauseBtn').addEventListener('click', () => {
    if (currentAudio && isFilePlaying) {
        currentAudio.pause();
        isFilePlaying = false;
        document.getElementById('playPauseBtn').textContent = '[ PLAY ]';
        if (audioCtx) audioCtx.suspend();
    } else if (currentAudio && !isFilePlaying) {
        var playPromise = currentAudio.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                isFilePlaying = true;
                if (audioCtx) audioCtx.resume();
                document.getElementById('playPauseBtn').textContent = '[ || ]';
                updateVisualization();
            }).catch(e => {
                document.getElementById('dbg').innerHTML = "> ERR: " + e.message;
            });
        }
    }
});

document.getElementById('micBtn').addEventListener('click', async () => {
    if (isFilePlaying) stopPlayback();
    if (isMicActive) {
        if (audioCtx) await audioCtx.close();
        isMicActive = false;
        document.getElementById('micBtn').classList.remove('active');
        document.getElementById('dbg').innerHTML = "> MIC OFF";
        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;
        return;
    }
    try {
        var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        var source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        await audioCtx.resume();
        isMicActive = true;
        document.getElementById('micBtn').classList.add('active');
        updateVisualization();
    } catch(e) {
        document.getElementById('dbg').innerHTML = "> ERR: NO MIC ACCESS";
    }
});

function emitMouse(type, touch) {
    document.dispatchEvent(new MouseEvent(type, {
        clientX: touch.clientX,
        clientY: touch.clientY,
        bubbles: true,
        cancelable: true,
        view: window
    }));
}

var blobContainer = document.getElementById('blob_container');
var touchStart = null;
var touchMoved = false;
var lastPanelTap = 0;

blobContainer.addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) return;
    var t = e.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
    touchMoved = false;
    emitMouse('mousemove', t);
}, { passive: true });

blobContainer.addEventListener('touchmove', function(e) {
    if (e.touches.length !== 1 || !touchStart) return;
    var t = e.touches[0];
    var dx = t.clientX - touchStart.x;
    var dy = t.clientY - touchStart.y;
    if (Math.abs(dx) + Math.abs(dy) > 8) {
        touchMoved = true;
    }
    if (touchMoved) {
        e.preventDefault();
        emitMouse('mousemove', t);
    }
}, { passive: false });

blobContainer.addEventListener('touchend', function() {
    if (!isMobileView() || !touchStart) {
        touchStart = null;
        return;
    }

    if (!touchMoved) {
        var now = Date.now();
        if (currentShape === 2) {
            if (now - lastPanelTap < 320) {
                document.body.classList.toggle('controls-visible');
                lastPanelTap = 0;
            } else {
                lastPanelTap = now;
            }
        } else {
            document.body.classList.toggle('controls-visible');
        }
    }

    touchStart = null;
    touchMoved = false;
});

if (isMobileView()) {
    document.querySelectorAll('.ui').forEach(function(el) {
        el.addEventListener('touchstart', function(e) {
            e.stopPropagation();
        });
        el.addEventListener('click', function(e) {
            e.stopPropagation();
        });
    });
}

function handleResize() {
    if (blob && blob.resize) blob.resize();
}
window.addEventListener('resize', handleResize);
window.addEventListener('orientationchange', function() {
    setTimeout(handleResize, 150);
});
setTimeout(handleResize, 100);
document.getElementById('dbg').innerHTML = isMobileView()
    ? '> READY // TAP TO OPEN'
    : '> READY // LOAD AUDIO';
</script>
